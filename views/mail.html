<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        .otp {
            font-size: 24px;
            color: #2563eb;
            font-weight: bold;
            padding: 10px 0;
        }
        ul {
            padding-left: 20px;
        }
        li {
            margin-bottom: 8px;
        }
        .footer {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            color: #666;
        }
    </style>
</head>
<body>
    <div>
        <p>Hello,</p>
        
        <p>Your One-Time Password (OTP) for logging into NexusChat is:</p>
        <div class="otp">{{otp}}</div>
        
        <p>Please note:</p>
        <ul>
            <li>This OTP is valid for the next 5 minutes.</li>
            <li>Do not share this code with anyone.</li>
        </ul>
        
        <p>If you did not request this OTP, please ignore this email or contact support.</p>
        
        <div class="footer">
            <p>Thank you,<br>The NexusChat Team</p>
        </div>
    </div>
</body>
</html>
